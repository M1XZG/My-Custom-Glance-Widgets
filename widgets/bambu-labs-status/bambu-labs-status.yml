- type: custom-api
  title: Bambu Lab Status
  cache: 5m
  url: https://status.bambulab.com/api/v2/summary.json
  template: |
    {{ $indicator := .JSON.String "status.indicator" }}
    {{ $description := .JSON.String "status.description" }}
    <div style="display: flex; align-items: center; gap: 10px;">
      <span
        style="width: 10px; height: 10px; border-radius: 50%; display: inline-block;
          {{ if eq $indicator "none" }}background-color: var(--color-positive);
          {{ else if eq $indicator "minor" }}background-color: var(--color-highlight);
          {{ else if eq $indicator "major" }}background-color: var(--color-negative);
          {{ else if eq $indicator "critical" }}background-color: var(--color-negative);
          {{ else }}background-color: var(--color-text-subdue);{{ end }}"
      ></span>
      <div>
        <a class="size-h6 color-highlight" href="https://status.bambulab.com" target="_blank" rel="noreferrer">Service Status</a>
        <div class="size-h4">{{ $description }}</div>
      </div>
    </div>
    <ul class="list list-gap-8" style="margin-top: 10px;">
      {{ range .JSON.Array "components" }}
        {{ if not (.Bool "group") }}
          {{ $status := .String "status" }}
          <li class="flex items-center gap-10" style="margin: 0.25rem 0;">
            <span
              style="width: 8px; height: 8px; border-radius: 50%; display: inline-block;
                {{ if eq $status "operational" }}background-color: var(--color-positive);
                {{ else if eq $status "degraded_performance" }}background-color: var(--color-highlight);
                {{ else if eq $status "partial_outage" }}background-color: var(--color-negative);
                {{ else if eq $status "major_outage" }}background-color: var(--color-negative);
                {{ else if eq $status "under_maintenance" }}background-color: var(--color-text-subdue);
                {{ else }}background-color: var(--color-text-subdue);{{ end }}"
            ></span>
            <span class="size-h6">{{ .String "name" }}</span>
            <span class="size-text-13 color-subdue" style="margin-left: auto;">
              {{ if eq $status "operational" }}Operational
              {{ else if eq $status "degraded_performance" }}Degraded
              {{ else if eq $status "partial_outage" }}Partial Outage
              {{ else if eq $status "major_outage" }}Major Outage
              {{ else if eq $status "under_maintenance" }}Maintenance
              {{ else }}{{ $status }}{{ end }}
            </span>
          </li>
        {{ end }}
      {{ end }}
    </ul>
